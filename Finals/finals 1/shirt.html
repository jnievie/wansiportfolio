<!DOCTYPE html>
<html>
<head>
<style>
body {
  height: 3000px;
  font-family: Arial, sans-serif;
}
.close-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  background-color: black;
  color: white;
  border-radius: 50%;
  width: 30px;
  height: 30px;
  text-align: center;
  line-height: 30px;
  cursor: pointer;
}

.product-card {
  position: relative;
  display: inline-block;
  margin-top: 100px;
  margin-left: 50px;
  width: 250px;
}

.product-card img {
  width: 100%;
  display: block;
}


.discount-badge {
  position: absolute;
  top: 10px;
  right: 10px;
  background-color: black;
  color: white;
  padding: 5px 10px;
  font-size: 12px;
}


.overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 60px;
  background-color: rgba(255, 255, 255, 0.5);
  display: flex;
  justify-content: center;
  align-items: center;
}

.cart-btn {
  background-color: white;
  border: 1px solid black;
  padding: 5px 15px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="close-btn">X</div>

<div class="fixed-box"></div>

<div class="product-card">
  <img src="img/shirt.jpg.jpg">
  <div class="discount-badge">20% OFF</div>
  <div class="overlay">
    <button class="cart-btn">Add to Cart</button>
  </div>
</div>

</body>
</html>
