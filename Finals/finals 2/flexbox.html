<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flexbox Task</title>

<style>


.flex-2-items {
  display: flex;
}
.flex-2-items div:first-child {
  width: 200px;
  background: lightblue;
}
.flex-2-items div:last-child {
  width: 75px;
  background: pink;
}

.flex-3-items {
  display: flex;
}
.flex-3-items div {
  width: 50px;
  background: lightgray;
}
.flex-3-items div:last-child {
  flex-grow: 1;
  background: lightgreen;
}


.flex-4-items {
  display: flex;
  justify-content: space-between;
}
.flex-4-items div {
  background: salmon;
  padding: 10px;
}


.flex-box-border {
  display: flex;
  justify-content: space-between;
  align-items: center;
  height: 50px;
  border: 2px solid gray;
  padding: 10px;
}


.container {
  display: flex;
  flex-direction: column;
}

.header, .footer {
  background: #e6e1c5;
  padding: 20px;
}

.main {
  display: flex;
}

.left, .right {
  flex: 1;
  padding: 50px;
  background: green;
  border: 3px solid yellow;
}


@media (min-width: 800px) {
  .main {
    flex-direction: row;
  }
}


@media (max-width: 400px) {
  .main {
    flex-direction: column;
  }

  .right {
    order: 1;
  }

  .left {
    order: 2;
  }
}

</style>
</head>

<body>

<h3>12a</h3>
<div class="flex-2-items">
  <div>200px</div>
  <div>75px</div>
</div>

<h3>12b</h3>
<div class="flex-3-items">
  <div>item1</div>
  <div>item2</div>
  <div>item3</div>
</div>

<h3>12c</h3>
<div class="flex-4-items">
  <div>item1</div>
  <div>item2</div>
  <div>item3</div>
  <div>item4</div>
</div>

<h3>12d</h3>
<div class="flex-box-border">
  <div>item1</div>
  <div>item2</div>
</div>

<hr>

<h2>Responsive Layout</h2>

<div class="container">
  <div class="header">This is a Header</div>

  <div class="main">
    <div class="left">Section left-nav</div>
    <div class="right">Section right-nav</div>
  </div>

  <div class="footer">This is a footer</div>
</div>

</body>
</html>
